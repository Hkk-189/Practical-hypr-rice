general {
    lock_cmd = pidof hyprlock || hyprlock       # what command runs to lock
    before_sleep_cmd = loginctl lock-session    # lock before the laptop sleeps
}

listener {
    timeout = 300                               # 5 minutes
    on-timeout = loginctl lock-session          # lock the screen
}

listener {
    timeout = 600                               # 10 minutes
    on-timeout = hyprctl dispatch dpms off       # turn off monitor
    on-resume = hyprctl dispatch dpms on         # turn on monitor when you move mouse
}
